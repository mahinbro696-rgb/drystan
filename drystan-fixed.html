<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Drystan – Business Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070A12;--bg2:#0D1117;--bg3:#141926;
  --card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--glow:rgba(99,102,241,0.35);
  --acc:#6366F1;--acc2:#818CF8;
  --green:#10B981;--red:#EF4444;--yellow:#F59E0B;--blue:#3B82F6;
  --t1:#F1F5F9;--t2:#94A3B8;--t3:#475569;
  --r:12px;--r2:8px;--sw:260px;--hh:64px;
  --grad:linear-gradient(135deg,#6366F1,#4F46E5);
}
[data-theme=light]{--bg:#F1F5F9;--bg2:#fff;--bg3:#E2E8F0;--card:rgba(0,0,0,0.03);--card2:rgba(0,0,0,0.06);--border:rgba(0,0,0,0.09);--t1:#0F172A;--t2:#475569;--t3:#94A3B8}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
/* LAYOUT */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.13) 0%,transparent 65%);padding:16px}
#app{display:none;height:100vh;overflow:hidden;flex-direction:row}
#app.show{display:flex}
#sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;flex-shrink:0;transition:transform .3s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:22px}
/* SIDEBAR */
.slogo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.slogo-i{width:36px;height:36px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;box-shadow:0 0 20px rgba(99,102,241,.4);flex-shrink:0}
.slogo-n{font-weight:700;font-size:17px;color:var(--t1)}
.snav{flex:1;padding:10px 0;overflow-y:auto}
.nlbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t3);padding:10px 16px 4px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:var(--r2);cursor:pointer;color:var(--t2);font-size:14px;font-weight:500;border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:inherit;transition:all .2s}
.ni:hover{background:var(--card2);color:var(--t1)}
.ni.active{background:rgba(99,102,241,.15);color:var(--acc2)}
.ni svg{width:17px;height:17px;flex-shrink:0}
.sftr{padding:10px;border-top:1px solid var(--border)}
.sovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
/* HEADER */
.hbtn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--r2);background:var(--card);border:1px solid var(--border);cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;transition:all .2s;font-family:inherit}
.hbtn:hover{border-color:var(--glow);color:var(--t1)}
.hbtn.ico{padding:7px;width:34px;height:34px;justify-content:center}
.hav{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:border-color .2s}
.card:hover{border-color:var(--glow)}
.g{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;transition:border-color .2s}
.stat:hover{border-color:var(--glow)}
.sv{font-size:26px;font-weight:800;margin-bottom:3px}
.sl{font-size:12px;color:var(--t2)}
.ss{font-size:11px;color:var(--t3);margin-top:2px}
.si{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r2);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.bp{background:var(--grad);color:#fff}.bp:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.3)}
.bs{background:var(--card2);border:1px solid var(--border);color:var(--t1)}.bs:hover{border-color:var(--glow)}
.bd{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#EF4444}.bd:hover{background:rgba(239,68,68,.22)}
.bg{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#10B981}
.bsm{padding:6px 12px;font-size:12px}
.bico{padding:7px;width:32px;height:32px;justify-content:center}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.bfull{width:100%;justify-content:center}
/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fl{font-size:12px;font-weight:500;color:var(--t2)}
.fi{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;font-size:14px;color:var(--t1);font-family:inherit;outline:none;width:100%;transition:border-color .2s}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.fi::placeholder{color:var(--t3)}
.fi option{background:#1a1f2e}
[data-theme=light] .fi option{background:#fff;color:#111}
textarea.fi{resize:vertical;min-height:70px}
/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:14px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.025);vertical-align:middle}
[data-theme=light] td{border-bottom:1px solid rgba(0,0,0,.05)}
tbody tr:hover{background:var(--card2)}
tbody tr:last-child td{border:none}
/* BADGE */
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bpend{background:rgba(245,158,11,.15);color:#F59E0B}
.bdone{background:rgba(16,185,129,.15);color:#10B981}
.bcanc{background:rgba(239,68,68,.15);color:#EF4444}
.bsent{background:rgba(59,130,246,.15);color:#3B82F6}
.bpaid{background:rgba(16,185,129,.15);color:#10B981}
.bcod{background:rgba(245,158,11,.12);color:#F59E0B}
.bcat{background:rgba(99,102,241,.12);color:var(--acc2)}
/* MODAL */
.movl{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:500;padding:16px}
.movl.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mlg{max-width:660px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--border)}
.mh h3{font-size:16px;font-weight:600}
.mb{padding:18px 22px}
.mf{display:flex;gap:10px;justify-content:flex-end;padding:14px 22px;border-top:1px solid var(--border)}
/* MISC */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ph h1{font-size:21px;font-weight:700}
.ph p{font-size:13px;color:var(--t2);margin-top:2px}
.sbar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:8px 12px;flex:1;min-width:180px}
.sbar input{background:none;border:none;outline:none;color:var(--t1);font-size:14px;width:100%;font-family:inherit}
.div{height:1px;background:var(--border);margin:16px 0}
.empty{text-align:center;padding:50px 20px;color:var(--t2)}
.empty h3{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--t1)}
.al{display:flex;gap:8px;padding:10px 14px;border-radius:var(--r2);font-size:13px;margin-bottom:12px}
.aw{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#F59E0B}
.ae{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#EF4444}
.ao{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#10B981}
.ai{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);color:var(--acc2)}
/* TOAST */
.twrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:14px;min-width:240px;box-shadow:0 8px 30px rgba(0,0,0,.4);animation:fu .3s ease;display:flex;align-items:center;gap:8px;color:var(--t1)}
.tok{border-left:3px solid var(--green)}.ter{border-left:3px solid var(--red)}.tif{border-left:3px solid var(--acc)}
/* RECEIPT */
.rcpt{background:#fff;color:#111;padding:28px;font-family:'Inter',sans-serif;max-width:460px;margin:0 auto;border-radius:4px}
.rcpt-bn{font-family:"Hind Siliguri","Noto Sans Bengali",'Inter',sans-serif}
/* LOADING */
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite}
.ldc{display:flex;align-items:center;justify-content:center;min-height:200px}
.ldc-full{min-height:100vh;background:var(--bg);position:fixed;inset:0;z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fu .3s ease}
/* LOGIN */
.lbox{width:100%;max-width:380px}
.llogo{text-align:center;margin-bottom:28px}
.llogo-i{width:60px;height:60px;border-radius:16px;background:var(--grad);display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin-bottom:14px;box-shadow:0 0 32px rgba(99,102,241,.4)}
/* PRINT */
@media print{
  .no-print,#sidebar,#topbar,#twrap,.movl{display:none!important}
  #app{display:none!important}
  #rcptPrint{display:block!important;position:fixed;inset:0;z-index:9999;background:#fff;padding:20px}
}
#rcptPrint{display:none}
/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  .sovl.open{display:block}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:1fr}
  #content{padding:14px}
}
@media(max-width:480px){.g4,.g2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="rcptPrint"></div>

<!-- ══ LOADING SCREEN ══ -->
<div class="ldc-full" id="loadScreen">
  <div class="slogo-i" style="width:52px;height:52px;border-radius:14px;font-size:22px">D</div>
  <div class="spin"></div>
  <p style="color:var(--t2);font-size:14px">Connecting to database...</p>
</div>

<!-- ══ LOGIN ══ -->
<div id="loginPage" style="display:none">
  <div class="lbox">
    <div class="llogo">
      <div class="llogo-i">D</div>
      <h1 style="font-size:26px;font-weight:800;margin-bottom:4px">Drystan</h1>
      <p style="color:var(--t2);font-size:14px">Admin Panel – Sign in to continue</p>
    </div>
    <div class="card" style="padding:28px">
      <div class="fg">
        <label class="fl">Username</label>
        <input class="fi" id="lUser" placeholder="admin" autocomplete="username"/>
      </div>
      <div class="fg">
        <label class="fl">Password</label>
        <div style="position:relative">
          <input class="fi" id="lPass" type="password" placeholder="••••••••" style="padding-right:40px" autocomplete="current-password"/>
          <button type="button" onclick="togglePw()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3)">
            <svg id="eyeIco" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="lErr" class="al ae" style="display:none"></div>
      <button class="btn bp bfull" id="lBtn" onclick="doLogin()" style="padding:12px;font-size:15px;margin-top:4px">Sign In →</button>
    </div>
    <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--t3)">Default: admin / admin123</p>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="sovl" id="sovl" onclick="closeSB()"></div>
  <aside id="sidebar">
    <div class="slogo">
      <div class="slogo-i">D</div>
      <span class="slogo-n" id="bizNm">Drystan</span>
    </div>
    <nav class="snav">
      <div class="nlbl">MENU</div>
      <button class="ni active" data-p="dash" onclick="nav('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</button>
      <button class="ni" data-p="prods" onclick="nav('prods')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>Products</button>
      <button class="ni" data-p="newOrder" onclick="nav('newOrder')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>Create Order</button>
      <button class="ni" data-p="orders" onclick="nav('orders')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>Orders</button>
      <button class="ni" data-p="custs" onclick="nav('custs')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Customers</button>
      <button class="ni" data-p="cfg" onclick="nav('cfg')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>Settings</button>
    </nav>
    <div class="sftr">
      <button class="ni" style="color:#EF4444;width:100%" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</button>
    </div>
  </aside>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hbtn ico no-print" onclick="toggleSB()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span id="pgTitle" style="font-size:17px;font-weight:600">Dashboard</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="hbtn" onclick="toggleLang()" title="Language"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg><span id="langLbl">EN</span></button>
        <button class="hbtn ico" onclick="toggleTheme()"><svg id="thIco" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
        <div class="hav">A</div>
      </div>
    </div>
    <main id="content" class="fade"></main>
  </div>
</div>

<div class="twrap" id="twrap"></div>

<!-- ══ FIREBASE SDK ══ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy, limit, Timestamp, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ════════════════════════════════════════
//  🔥 FIREBASE CONFIG — এখানে তোমার config দাও
//  Firebase Console → Project Settings → Your Apps → Config
// ════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDtoVVHuMKUiIbyQEOmEPyspzBNT5zxGC4",
  authDomain: "drystan-cfe3b.firebaseapp.com",
  projectId: "drystan-cfe3b",
  storageBucket: "drystan-cfe3b.firebasestorage.app",
  messagingSenderId: "419259525007",
  appId: "1:419259525007:web:25c283364579b356d74dfa"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// ══ HELPERS ══
const cur = n => '৳' + Number(n||0).toLocaleString('en-BD');
const fdate = d => {
  if (!d) return '';
  const dt = d?.toDate ? d.toDate() : new Date(d);
  return dt.toLocaleDateString(S.lang==='bn'?'bn-BD':'en-GB',{year:'numeric',month:'short',day:'numeric'});
};
const today = () => new Date().toISOString().slice(0,10);
const plus3 = () => { const d=new Date();d.setDate(d.getDate()+3);return d.toISOString().slice(0,10); };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid6 = () => Math.random().toString(36).slice(2,8).toUpperCase();

// ══ STATE ══
const S = {
  lang: localStorage.getItem('dry_lang')||'en',
  theme: localStorage.getItem('dry_theme')||'dark',
  page: 'dash',
  cfg: {},
  lastOrder: null,
  orderItems: [{pid:'',qty:1,price:''}],
  orderForm: null,
  user: null,
};

// ══ i18n ══
const TR = {
  en:{pending:'Pending',completed:'Completed',cancelled:'Cancelled',parcel_sent:'Parcel Sent',paid:'Paid',cod:'Cash on Delivery',thankYou:'Thank you for your order!'},
  bn:{pending:'অপেক্ষমান',completed:'সম্পন্ন',cancelled:'বাতিল',parcel_sent:'পার্সেল পাঠানো',paid:'পেইড',cod:'ক্যাশ অন ডেলিভারি',thankYou:'আপনার অর্ডারের জন্য ধন্যবাদ!'}
};
const t = k => TR[S.lang]?.[k]||TR.en[k]||k;

// ══ TOAST ══
function toast(msg,type='ok'){
  const w=document.getElementById('twrap');
  const el=document.createElement('div');
  el.className=`toast t${type==='ok'?'ok':type==='err'?'er':'if'}`;
  el.innerHTML=(type==='ok'?'✅':type==='err'?'❌':'ℹ️')+' '+esc(msg);
  w.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},3000);
}

    :'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';

window.toggleSB=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('sovl').classList.toggle('open');};
window.closeSB=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sovl').classList.remove('open');};
window.togglePw=()=>{const i=document.getElementById('lPass');i.type=i.type==='password'?'text':'password';};

// ══ AUTH ══
window.doLogin=async()=>{
  const u=document.getElementById('lUser').value.trim();
  const p=document.getElementById('lPass').value;
  const btn=document.getElementById('lBtn');
  const err=document.getElementById('lErr');
  err.style.display='none';
  if(!u||!p){err.style.display='flex';err.textContent='❌ Please enter username and password.';return;}
  if(u!=='admin'){err.style.display='flex';err.textContent='❌ Invalid username or password.';return;}
  btn.disabled=true;btn.textContent='Signing in...';
  try{
    // Direct Firebase Auth login — no Firestore needed before auth
    const email='admin@drystan.app';
    await signInWithEmailAndPassword(auth,email,p);
  }catch(e){
    const msg=e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'||e.code==='auth/user-not-found'
      ?'Invalid username or password.'
      :e.code==='auth/too-many-requests'
      ?'Too many attempts. Please wait a few minutes.'
      :e.message;
    err.style.display='flex';err.textContent='❌ '+msg;
    btn.disabled=false;btn.textContent='Sign In →';
  }
};
window.doLogout=async()=>{await signOut(auth);};

const pgTitles={dash:'Dashboard',prods:'Products',newOrder:'Create Order',orders:'Orders',custs:'Customers',cfg:'Settings'};
window.nav=(p)=>{
  S.page=p;window.closeSB();
  document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('active',n.dataset.p===p));
  document.getElementById('pgTitle').textContent=pgTitles[p]||p;
  if(p!=='newOrder'){S.lastOrder=null;S.orderItems=[{pid:'',qty:1,price:''}];S.orderForm=null;}
  renderPage();
};
function renderPage(){
  const c=document.getElementById('content');c.className='fade';

  if(nm)nm.textContent=S.lang==='bn'?(S.cfg.bizNameBn||S.cfg.bizName||'Drystan'):(S.cfg.bizName||'Drystan');

}

let pSrch='';
async function pgProds(){
  loading();
  try{
    const snap=await getDocs(query(Col('products'),where('active','==',true),orderBy('createdAt','desc')));
    let prods=snap.docs.map(d=>({id:d.id,...d.data()}));

    <div class="ph">
      <div><h1>Products</h1><p>${prods.length} products</p></div>
      <button class="btn bp" onclick="openProdModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Product</button>

      <tbody>${prods.map(p=>`<tr>

        <td>${cur(p.buyPrice)}</td><td style="font-weight:600">${cur(p.sellPrice)}</td>
        <td style="color:#10B981;font-weight:500">${cur(p.sellPrice-p.buyPrice)}</td>

async function openProdModal(id=null){
  let p=null;
  if(id){const d=await getDoc(Doc('products',id));p={id,...d.data()};}
  document.getElementById('prodMod').innerHTML=`
  <div class="mh"><h3>${p?'Edit Product':'Add Product'}</h3><button class="btn bs bico" onclick="closeMov('prodMov')">✕</button></div>
  <div class="mb">
    <div class="g g2">
      <div class="fg"><label class="fl">Product Name (EN) *</label><input class="fi" id="p_n" value="${esc(p?.name||'')}" required/></div>
      <div class="fg"><label class="fl">পণ্যের নাম (BN)</label><input class="fi" id="p_nb" value="${esc(p?.nameBn||'')}"/></div>
      <div class="fg"><label class="fl">Buy Price (৳) *</label><input class="fi" type="number" id="p_b" min="0" value="${p?.buyPrice||''}" required/></div>
      <div class="fg"><label class="fl">Sell Price (৳) *</label><input class="fi" type="number" id="p_s" min="0" value="${p?.sellPrice||''}" required/></div>
      <div class="fg"><label class="fl">Stock *</label><input class="fi" type="number" id="p_st" min="0" value="${p?.stock??0}" required/></div>
      <div class="fg"><label class="fl">Low Stock Alert</label><input class="fi" type="number" id="p_al" min="0" value="${p?.alertAt??5}"/></div>
      <div class="fg" style="grid-column:1/-1"><label class="fl">Category</label><input class="fi" id="p_cat" value="${esc(p?.cat||'General')}"/></div>
    </div>
  </div>
  <div class="mf">
    <button class="btn bs" onclick="closeMov('prodMov')">Cancel</button>
    <button class="btn bp" id="pSvBtn" onclick="saveProd('${id||''}')">💾 ${p?'Update':'Add'} Product</button>
  </div>`;
  document.getElementById('prodMov').classList.add('open');
}
window.openProdModal=openProdModal;

async function saveProd(id){
  const btn=document.getElementById('pSvBtn');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    const data={
      name:document.getElementById('p_n').value.trim(),
      nameBn:document.getElementById('p_nb').value.trim(),
      buyPrice:Number(document.getElementById('p_b').value),
      sellPrice:Number(document.getElementById('p_s').value),
      stock:Number(document.getElementById('p_st').value),
      alertAt:Number(document.getElementById('p_al').value)||5,
      cat:document.getElementById('p_cat').value.trim()||'General',
      active:true
    };
    if(!data.name||!data.sellPrice){toast('Name and sell price required','err');btn.disabled=false;btn.textContent='💾 Save';return;}
    if(id){await updateDoc(Doc('products',id),{...data,updatedAt:serverTimestamp()});toast('Product updated!');}
    else{await addDoc(Col('products'),{...data,createdAt:serverTimestamp()});toast('Product added!');}
    closeMov('prodMov');pgProds();
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.textContent='💾 Save';}
}
window.saveProd=saveProd;

async function deleteProd(id,name){
  if(!confirm(`Delete "${name}"?`))return;
  try{await updateDoc(Doc('products',id),{active:false});toast('Product deleted');pgProds();}
  catch(e){toast(e.message,'err');}
}
window.deleteProd=deleteProd;

window.submitOrder=async()=>{
  const f=S.orderForm;
  if(!f.cName||!f.cPhone||!f.cAddr){toast('Please fill customer info','err');return;}
  const validItems=S.orderItems.filter(it=>it.pid&&it.price);
  if(!validItems.length){toast('Add at least one product','err');return;}
  const btn=document.getElementById('subOBtn');btn.disabled=true;btn.textContent='Creating...';
  try{
    // Stock check
    for(const it of validItems){
      const pd=await getDoc(Doc('products',it.pid));
      const pdata=pd.data();
      if(!pdata||pdata.stock<Number(it.qty)){toast(`Insufficient stock for ${pdata?.name||'product'}. Available: ${pdata?.stock||0}`,'err');btn.disabled=false;btn.textContent='✅ Create Order & Receipt';return;}
    }
    const sub=validItems.reduce((s,it)=>s+(Number(it.price)*Number(it.qty)),0);
    const del=Number(f.delivery||0);
    const total=sub+del;
    // Get order count for number
    const cnt=(await getDocs(Col('orders'))).size;
    const num='DRY-'+String(cnt+1).padStart(5,'0');
    // Find/create customer
    const cSnap=await getDocs(query(Col('customers'),where('phone','==',f.cPhone)));
    let custId;
    if(!cSnap.empty){
      const cDoc=cSnap.docs[0];custId=cDoc.id;
      await updateDoc(Doc('customers',custId),{name:f.cName,addr:f.cAddr,orders:(cDoc.data().orders||0)+1,spent:(cDoc.data().spent||0)+total,updatedAt:serverTimestamp()});
    }else{
      const cRef=await addDoc(Col('customers'),{name:f.cName,phone:f.cPhone,addr:f.cAddr,orders:1,spent:total,createdAt:serverTimestamp()});
      custId=cRef.id;
    }
    // Create order
    const oItems=await Promise.all(validItems.map(async it=>{const pd=(await getDoc(Doc('products',it.pid))).data();return{pid:it.pid,name:pd.name,nameBn:pd.nameBn||pd.name,qty:Number(it.qty),price:Number(it.price),lineTotal:Number(it.price)*Number(it.qty)};}));
    const oRef=await addDoc(Col('orders'),{num,custId,cName:f.cName,cPhone:f.cPhone,cAddr:f.cAddr,recvName:f.recvName||f.cName,payMethod:f.payMethod,delivery:del,subtotal:sub,total,status:'pending',payStatus:f.payMethod==='paid'?'paid':'pending',orderDate:f.orderDate,delivDate:f.delivDate,rLang:f.rLang,notes:f.notes,items:oItems,createdAt:serverTimestamp()});
    // Deduct stock
    for(const it of validItems){await updateDoc(Doc('products',it.pid),{stock:(await getDoc(Doc('products',it.pid))).data().stock-Number(it.qty)});}
    const orderData={id:oRef.id,num,cName:f.cName,cPhone:f.cPhone,cAddr:f.cAddr,recvName:f.recvName||f.cName,payMethod:f.payMethod,delivery:del,subtotal:sub,total,orderDate:f.orderDate,delivDate:f.delivDate,rLang:f.rLang,notes:f.notes,items:oItems};
    toast('Order created! 🎉');
    S.lastOrder=orderData;S.orderItems=[{pid:'',qty:1,price:''}];S.orderForm=null;
    showReceipt(orderData);
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.textContent='✅ Create Order & Receipt';}
};

async function delOrder(id){
  if(!confirm('Delete this order? Stock will be restored.'))return;
  try{
    const d=await getDoc(Doc('orders',id));
    const o=d.data();
    if(o.status!=='cancelled'&&o.items){
      for(const it of o.items){
        const pd=await getDoc(Doc('products',it.pid));
        if(pd.exists())await updateDoc(Doc('products',it.pid),{stock:(pd.data().stock||0)+it.qty});
      }
    }
    await deleteDoc(Doc('orders',id));
    toast('Order deleted, stock restored');pgOrders();
  }catch(e){toast(e.message,'err');}
}

  const c={id,...cd.data()};
  const oSnap=await getDocs(query(Col('orders'),where('custId','==',id),orderBy('createdAt','desc')));
  const orders=oSnap.docs.map(d=>({id:d.id,...d.data()}));
  const sb=s=>{const m={pending:'bpend',completed:'bdone',cancelled:'bcanc',parcel_sent:'bsent'};const l={pending:'Pending',completed:'Completed',cancelled:'Cancelled',parcel_sent:'Parcel Sent'};return`<span class="badge ${m[s]||'bpend'}">${l[s]||s}</span>`;};
  document.getElementById('custMod').innerHTML=`
  <div class="mh"><h3>${esc(c.name)}</h3><button class="btn bs bico" onclick="closeMov('custMov')">✕</button></div>
  <div class="mb">
    <div class="g g2" style="margin-bottom:14px;gap:10px">
      <div class="card" style="padding:14px"><div style="font-size:11px;color:var(--t2)">Phone</div><div style="font-weight:600">${esc(c.phone)}</div></div>
      <div class="card" style="padding:14px"><div style="font-size:11px;color:var(--t2)">Total Orders</div><div style="font-weight:700;font-size:20px">${c.orders||0}</div></div>
      <div class="card" style="padding:14px;grid-column:1/-1"><div style="font-size:11px;color:var(--t2)">Address</div><div>${esc(c.addr||'-')}</div></div>
      <div class="card" style="padding:14px"><div style="font-size:11px;color:var(--t2)">Total Spent</div><div style="font-weight:700;font-size:20px;color:#10B981">${cur(c.spent)}</div></div>
    </div>
    <h4 style="font-weight:600;margin-bottom:10px">Order History (${orders.length})</h4>
    ${orders.length===0?'<p style="color:var(--t2);font-size:13px">No orders yet</p>':`
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="border-bottom:1px solid var(--border)"><th style="padding:6px 8px;text-align:left">Order #</th><th style="padding:6px 8px;text-align:right">Total</th><th style="padding:6px 8px">Status</th><th style="padding:6px 8px;text-align:right">Date</th></tr></thead>
      <tbody>${orders.map(o=>`<tr style="border-bottom:1px solid rgba(255,255,255,.03)"><td style="padding:8px"><code>${esc(o.num)}</code></td><td style="text-align:right;padding:8px;font-weight:600">${cur(o.total)}</td><td style="padding:8px">${sb(o.status)}</td><td style="text-align:right;padding:8px;color:var(--t2)">${o.orderDate||''}</td></tr>`).join('')}</tbody>
    </table>`}
  </div>`;
  document.getElementById('custMov').classList.add('open');
}
window.viewCust=viewCust;

async function delCust(id,name){
  if(!confirm(`Delete "${name}"?`))return;
  try{await deleteDoc(Doc('customers',id));toast('Customer deleted');pgCusts();}
  catch(e){toast(e.message,'err');}
}
window.delCust=delCust;

// ════════════════════════════════════════
//  SETTINGS
// ════════════════════════════════════════
async function pgCfg(){
  loading();
  try{
    const cfgDoc=await getDoc(Doc('config','settings'));
    const cfg=cfgDoc.data()||{};
    setC(`
    <div class="ph"><div><h1>Settings</h1><p>Manage business configuration</p></div></div>
    <div class="g g2" style="gap:14px">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:14px">🏢 Business Info</h3>
          <div class="fg"><label class="fl">Business Name (English)</label><input class="fi" id="s_n" value="${esc(cfg.bizName||'Drystan')}"/></div>
          <div class="fg"><label class="fl">Business Name (বাংলা)</label><input class="fi" id="s_nb" value="${esc(cfg.bizNameBn||'ড্রাইস্টান')}"/></div>
          <div class="fg"><label class="fl">Address</label><textarea class="fi" id="s_addr" rows="2">${esc(cfg.bizAddr||'')}</textarea></div>
          <div class="fg"><label class="fl">Phone</label><input class="fi" id="s_ph" value="${esc(cfg.bizPhone||'')}"/></div>
          <div class="div"></div>
          <h4 style="font-size:13px;font-weight:600;margin-bottom:12px">💰 Delivery Charges</h4>
          <div class="g g2" style="gap:10px">
            <div class="fg" style="margin:0"><label class="fl">COD Charge (৳)</label><input class="fi" type="number" id="s_dc" value="${cfg.delCOD||150}"/></div>
            <div class="fg" style="margin:0"><label class="fl">Paid Charge (৳)</label><input class="fi" type="number" id="s_dp" value="${cfg.delPaid||0}"/></div>
          </div>
          <div class="div"></div>
          <h4 style="font-size:13px;font-weight:600;margin-bottom:12px">🧾 Receipt Footer</h4>
          <div class="fg"><label class="fl">Footer (English)</label><input class="fi" id="s_fe" value="${esc(cfg.footerEn||'Thank you for your order!')}"/></div>
          <div class="fg"><label class="fl">Footer (বাংলা)</label><input class="fi" id="s_fb" value="${esc(cfg.footerBn||'আপনার অর্ডারের জন্য ধন্যবাদ!')}"/></div>
          <button class="btn bp bfull" onclick="saveCfg()">💾 Save Settings</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">🔐 Admin Username</h3>
          <div class="al aw">⚠️ Password change করুন Firebase Console → Authentication থেকে</div>
          <div class="fg"><label class="fl">Admin Username (for login display)</label><input class="fi" id="s_un" value="${esc(cfg.adminUsername||'admin')}"/></div>
          <button class="btn bs bfull" onclick="saveUsername()">💾 Save Username</button>
        </div>
        <div class="card" style="border-color:rgba(99,102,241,.3)">
          <h4 style="font-weight:600;margin-bottom:10px">ℹ️ System</h4>
          <div style="font-size:13px;color:var(--t2);line-height:2.2">
            <div>Version: <strong style="color:var(--t1)">Drystan v1.0</strong></div>
            <div>Database: <strong style="color:#10B981">Firebase Firestore ✅</strong></div>
            <div>Auth: <strong style="color:#10B981">Firebase Auth ✅</strong></div>
            <div>Hosting: <strong style="color:var(--t1)">GitHub Pages</strong></div>
          </div>
        </div>
      </div>
    </div>`);
  }catch(e){setC(`<div class="al ae">❌ ${e.message}</div>`);}
}

window.saveCfg=async()=>{
  try{
    const data={
      bizName:document.getElementById('s_n').value,
      bizNameBn:document.getElementById('s_nb').value,
      bizAddr:document.getElementById('s_addr').value,
      bizPhone:document.getElementById('s_ph').value,
      delCOD:document.getElementById('s_dc').value,
      delPaid:document.getElementById('s_dp').value,
      footerEn:document.getElementById('s_fe').value,
      footerBn:document.getElementById('s_fb').value,
    };
    await setDoc(Doc('config','settings'),data,{merge:true});
    S.cfg={...S.cfg,...data};
    document.getElementById('bizNm').textContent=S.lang==='bn'?(data.bizNameBn||data.bizName):(data.bizName);
    toast('Settings saved! ✅');
  }catch(e){toast(e.message,'err');}
};
window.saveUsername=async()=>{
  try{
    const un=document.getElementById('s_un').value.trim();
    await setDoc(Doc('config','settings'),{adminUsername:un},{merge:true});
    toast('Username saved!');
  }catch(e){toast(e.message,'err');}
};

// ══ MODAL CLOSE ══
window.closeMov=(id)=>{document.getElementById(id)?.classList.remove('open');};

// ════════════════════════════════════════
//  FIREBASE AUTH STATE
// ════════════════════════════════════════
onAuthStateChanged(auth, async(user)=>{
  document.getElementById('loadScreen').style.display='none';
  if(user){
    S.user=user;
    // Load config
    try{
      const cfgDoc=await getDoc(Doc('config','settings'));
      if(cfgDoc.exists())S.cfg=cfgDoc.data();
    }catch{}
    document.getElementById('loginPage').style.display='none';
    document.getElementById('app').classList.add('show');
    applyTheme();
    document.getElementById('langLbl').textContent=S.lang.toUpperCase();
    nav('dash');
  }else{
    document.getElementById('app').classList.remove('show');
    document.getElementById('loginPage').style.display='flex';
    applyTheme();
  }
});

// Enter key for login
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginPage').style.display!=='none')window.doLogin();
});

// expose S for inline handlers
window.S=S;
</script>
</body>
</html>

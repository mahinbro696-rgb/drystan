<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Drystan – Business Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070A12;--bg2:#0D1117;--bg3:#141926;--bg4:#1a2035;
  --card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.07);--card3:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--glow:rgba(99,102,241,0.4);
  --acc:#6366F1;--acc2:#818CF8;--acc3:#4F46E5;--acc4:rgba(99,102,241,0.15);
  --green:#10B981;--red:#EF4444;--yellow:#F59E0B;--blue:#3B82F6;--purple:#A855F7;
  --t1:#F1F5F9;--t2:#94A3B8;--t3:#475569;--t4:#334155;
  --r:14px;--r2:10px;--r3:6px;--sw:268px;--hh:64px;
  --grad:linear-gradient(135deg,#6366F1,#4F46E5);
  --grad2:linear-gradient(135deg,#6366F1,#A855F7);
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow2:0 8px 40px rgba(0,0,0,0.5);
  --glow-shadow:0 0 30px rgba(99,102,241,0.25);
}
[data-theme=light]{
  --bg:#F0F4FF;--bg2:#ffffff;--bg3:#E8EEFF;--bg4:#dde4ff;
  --card:rgba(99,102,241,0.04);--card2:rgba(99,102,241,0.08);--card3:rgba(99,102,241,0.12);
  --border:rgba(99,102,241,0.12);--border2:rgba(99,102,241,0.2);
  --t1:#0F172A;--t2:#475569;--t3:#64748B;--t4:#94A3B8;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);transition:background .4s,color .4s;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.4)}

/* ══ ANIMATIONS ══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(99,102,241,.2)}50%{box-shadow:0 0 40px rgba(99,102,241,.5)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.fade{animation:fadeUp .35s cubic-bezier(.22,.68,0,1.2)}
.fade-fast{animation:fadeUp .2s ease}
.slide{animation:slideIn .3s ease}
.scale{animation:scaleIn .25s cubic-bezier(.22,.68,0,1.2)}

/* ══ LAYOUT ══ */
#loadScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity .5s}
#loadScreen.hide{opacity:0;pointer-events:none}
#loginWrap{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:16px;z-index:100;background-image:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(168,85,247,.08) 0%,transparent 50%)}
#loginWrap.show{display:flex}
#appWrap{display:none;height:100vh;overflow:hidden}
#appWrap.show{display:flex;animation:fadeIn .4s ease}
#sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:200;flex-shrink:0;position:relative}
#sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,rgba(99,102,241,.3),transparent)}
#mainArea{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0}
#pageContent{flex:1;overflow-y:auto;padding:24px;scroll-behavior:smooth}
.sOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;backdrop-filter:blur(3px)}

/* ══ SIDEBAR ══ */
.sLogo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sLogoIco{width:38px;height:38px;border-radius:11px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 0 20px rgba(99,102,241,.5);transition:transform .2s}
.sLogoIco:hover{transform:scale(1.08) rotate(-3deg)}
.sLogoTxt{font-weight:800;font-size:17px;background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sRoleBadge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-left:auto}
.sRoleBadge.admin{background:rgba(99,102,241,.2);color:var(--acc2)}
.sRoleBadge.mod{background:rgba(16,185,129,.15);color:#10B981}
.sNav{flex:1;padding:12px 0;overflow-y:auto}
.sSection{margin-bottom:4px}
.sSectionLbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);padding:8px 18px 4px}
.nItem{display:flex;align-items:center;gap:11px;padding:10px 14px;margin:2px 10px;border-radius:var(--r2);cursor:pointer;color:var(--t2);font-size:14px;font-weight:500;border:none;background:none;width:calc(100% - 20px);text-align:left;font-family:inherit;transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.nItem::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity .2s;border-radius:var(--r2)}
.nItem:hover{color:var(--t1);background:var(--card2);transform:translateX(2px)}
.nItem.active{background:var(--acc4);color:var(--acc2);border:1px solid rgba(99,102,241,.2)}
.nItem.active::after{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;background:var(--grad);border-radius:0 3px 3px 0}
.nItem svg{width:17px;height:17px;flex-shrink:0;transition:transform .2s}
.nItem:hover svg{transform:scale(1.1)}
.nItemBadge{margin-left:auto;background:var(--acc4);color:var(--acc2);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.sFtr{padding:12px;border-top:1px solid var(--border)}
.sUserInfo{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r2);background:var(--card);margin-bottom:8px}
.sUserAvatar{width:32px;height:32px;border-radius:50%;background:var(--grad2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.sUserName{font-size:13px;font-weight:600;color:var(--t1)}
.sUserRole{font-size:11px;color:var(--t2)}

/* ══ TOPBAR ══ */
.tLeft,.tRight{display:flex;align-items:center;gap:10px}
.pgTitle{font-size:17px;font-weight:700;color:var(--t1)}
.tBtn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r2);background:var(--card);border:1px solid var(--border);cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;transition:all .2s;font-family:inherit}
.tBtn:hover{border-color:var(--glow);color:var(--t1);background:var(--card2)}
.tBtn.ico{padding:8px;width:36px;height:36px;justify-content:center}
.tAvatar{width:34px;height:34px;border-radius:50%;background:var(--grad2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:transform .2s;box-shadow:0 0 12px rgba(99,102,241,.3)}
.tAvatar:hover{transform:scale(1.08)}

/* ══ CARDS ══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:all .25s cubic-bezier(.4,0,.2,1)}
.card:hover{border-color:var(--border2);box-shadow:var(--glow-shadow)}
.cardTitle{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.g{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}

/* Stat card */
.statCard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;transition:all .25s cubic-bezier(.4,0,.2,1);cursor:default}
.statCard:hover{transform:translateY(-2px);border-color:var(--border2);box-shadow:var(--glow-shadow)}
.statVal{font-size:28px;font-weight:800;margin-bottom:4px;background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.statLbl{font-size:12px;color:var(--t2);font-weight:500}
.statSub{font-size:11px;color:var(--t3);margin-top:3px}
.statIco{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
.statCard:hover .statIco{transform:scale(1.08) rotate(5deg)}

/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s cubic-bezier(.4,0,.2,1);font-family:inherit;line-height:1;white-space:nowrap}
.bP{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.bP:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.45)}
.bP:active{transform:translateY(0)}
.bS{background:var(--card2);border:1px solid var(--border);color:var(--t1)}
.bS:hover{border-color:var(--border2);background:var(--card3)}
.bD{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#EF4444}
.bD:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4)}
.bG{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#10B981}
.bG:hover{background:rgba(16,185,129,.2)}
.bY{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#F59E0B}
.bSm{padding:7px 13px;font-size:12px}
.bIco{padding:8px;width:34px;height:34px;justify-content:center}
.bFull{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ══ FORM ══ */
.fG{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fL{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.3px}
.fI{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;font-size:14px;color:var(--t1);font-family:inherit;outline:none;width:100%;transition:all .2s}
.fI:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(99,102,241,.12);background:var(--card2)}
.fI::placeholder{color:var(--t3)}
.fI option{background:#1a1f2e;color:var(--t1)}
[data-theme=light] .fI option{background:#fff;color:#111}
textarea.fI{resize:vertical;min-height:75px}
.fRow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.inpIco{position:relative}
.inpIco svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;width:15px;height:15px}
.inpIco .fI{padding-left:36px}

/* ══ TABLE ══ */
.tWrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r2)}
table{width:100%;border-collapse:collapse;font-size:14px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
td{padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle;transition:background .15s}
[data-theme=light] td{border-bottom:1px solid rgba(0,0,0,.04)}
tbody tr{transition:background .15s}
tbody tr:hover td{background:var(--card2)}
tbody tr:last-child td{border:none}

/* ══ BADGES ══ */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bPend{background:rgba(245,158,11,.15);color:#F59E0B;border:1px solid rgba(245,158,11,.2)}
.bDone{background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.2)}
.bCanc{background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.2)}
.bSent{background:rgba(59,130,246,.15);color:#3B82F6;border:1px solid rgba(59,130,246,.2)}
.bPaid{background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.2)}
.bCOD{background:rgba(245,158,11,.1);color:#F59E0B;border:1px solid rgba(245,158,11,.15)}
.bCat{background:var(--acc4);color:var(--acc2);border:1px solid rgba(99,102,241,.2)}
.bAdmin{background:rgba(168,85,247,.15);color:#A855F7;border:1px solid rgba(168,85,247,.2)}
.bMod{background:rgba(16,185,129,.12);color:#10B981;border:1px solid rgba(16,185,129,.15)}

/* ══ MODAL ══ */
.mOvl{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:500;padding:16px}
.mOvl.open{display:flex;animation:fadeIn .2s ease}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow2);animation:scaleIn .25s cubic-bezier(.22,.68,0,1.2)}
.mLg{max-width:680px}
.mH{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.mH h3{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.mB{padding:20px 24px}
.mF{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}

/* ══ MISC ══ */
.pH{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.pH h1{font-size:22px;font-weight:800}
.pH p{font-size:13px;color:var(--t2);margin-top:3px}
.sBar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:9px 14px;flex:1;min-width:200px;transition:border-color .2s}
.sBar:focus-within{border-color:var(--acc)}
.sBar input{background:none;border:none;outline:none;color:var(--t1);font-size:14px;width:100%;font-family:inherit}
.divider{height:1px;background:var(--border);margin:18px 0}
.empty{text-align:center;padding:60px 20px;color:var(--t2)}
.empty h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--t1)}
.empty p{font-size:14px}
.al{display:flex;gap:10px;padding:12px 16px;border-radius:var(--r2);font-size:13px;margin-bottom:14px;align-items:flex-start}
.aW{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:#F59E0B}
.aE{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#EF4444}
.aO{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:#10B981}
.aI{background:var(--acc4);border:1px solid rgba(99,102,241,.2);color:var(--acc2)}

/* ══ TOAST ══ */
.toastWrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:13px 18px;font-size:14px;font-weight:500;min-width:260px;box-shadow:var(--shadow2);animation:fadeUp .35s cubic-bezier(.22,.68,0,1.2);display:flex;align-items:center;gap:10px;color:var(--t1);pointer-events:auto}
.tOk{border-left:3px solid var(--green)}
.tEr{border-left:3px solid var(--red)}
.tIf{border-left:3px solid var(--acc)}
.tWa{border-left:3px solid var(--yellow)}

/* ══ RECEIPT ══ */
.rcptBox{background:#fff;color:#111;padding:32px;font-family:'Inter',sans-serif;max-width:480px;margin:0 auto;border-radius:4px}
.rcptBn{font-family:'Hind Siliguri','Noto Sans Bengali','Inter',sans-serif}

/* ══ LOADING ══ */
.spin{width:38px;height:38px;border:3px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
.spinSm{width:18px;height:18px;border-width:2px}
.ldC{display:flex;align-items:center;justify-content:center;min-height:200px}

/* ══ SKELETON ══ */
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r2);height:14px}

/* ══ PRINT ══ */
@media print{
  .no-print,#appWrap>*:not(#rcptPrintArea){display:none!important}
  #rcptPrintArea{display:block!important;position:fixed;inset:0;z-index:9999;background:#fff;padding:20px}
}
#rcptPrintArea{display:none}

/* ══ LOGIN PAGE ══ */
.loginBox{width:100%;max-width:400px}
.loginLogo{text-align:center;margin-bottom:32px}
.loginLogoIco{width:64px;height:64px;border-radius:18px;background:var(--grad);display:inline-flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:#fff;margin-bottom:16px;box-shadow:0 0 40px rgba(99,102,241,.5);animation:glow 3s ease infinite}
.loginTabs{display:flex;gap:0;background:var(--card);border-radius:var(--r2);padding:4px;margin-bottom:20px;border:1px solid var(--border)}
.loginTab{flex:1;padding:9px;border-radius:8px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;color:var(--t2);transition:all .2s;border:none;background:none;font-family:inherit}
.loginTab.active{background:var(--grad);color:#fff;box-shadow:0 2px 10px rgba(99,102,241,.3)}

/* ══ RESPONSIVE ══ */
@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  .sOverlay.open{display:block}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3,.oGrid{grid-template-columns:1fr!important}
  #pageContent{padding:14px}
  .fRow{grid-template-columns:1fr}
}
@media(max-width:480px){
  .g4,.g2{grid-template-columns:1fr}
  .itmRow{grid-template-columns:1fr 90px 70px auto!important}
}
</style>
</head>
<body>

<div id="rcptPrintArea"></div>

<!-- ══ LOADING ══ -->
<div id="loadScreen">
  <div class="loginLogoIco" style="animation:glow 2s ease infinite,bounce 2s ease infinite">D</div>
  <div class="spin"></div>
  <p style="color:var(--t2);font-size:14px;margin-top:4px">Connecting to Drystan...</p>
</div>

<!-- ══ LOGIN ══ -->
<div id="loginWrap">
  <div class="loginBox">
    <div class="loginLogo">
      <div class="loginLogoIco">D</div>
      <h1 style="font-size:28px;font-weight:800;background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px">Drystan</h1>
      <p style="color:var(--t2);font-size:14px">Business Management System</p>
    </div>

    <!-- Login / Forgot tabs -->
    <div id="loginPanel" class="card" style="padding:28px">
      <!-- Tab -->
      <div class="loginTabs">
        <button class="loginTab active" id="tabLogin" onclick="switchAuthTab('login')">Sign In</button>
        <button class="loginTab" id="tabForgot" onclick="switchAuthTab('forgot')">Forgot Password</button>
      </div>

      <!-- SIGN IN FORM -->
      <div id="signInForm">
        <div class="fG">
          <label class="fL">Username</label>
          <div class="inpIco">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input class="fI" id="lUser" placeholder="admin" autocomplete="username"/>
          </div>
        </div>
        <div class="fG">
          <label class="fL">Password</label>
          <div class="inpIco" style="position:relative">

// ══ AUTH ══
window.doLogin = async () => {
  const u=$('lUser').value.trim();
  const p=$('lPass').value;
  const err=$('lErr');
  const btn=$('lBtn');
  err.style.display='none';
  if(!u||!p){err.style.display='flex';err.textContent='❌ Please enter username and password.';return;}
  btn.disabled=true;
  btn.innerHTML='<div class="spin spinSm"></div> Signing in...';
  try {
    // Get email from users collection by username
    const uSnap = await getDocs(query(Col('users'), where('username','==',u)));
    let email = null;
    if(!uSnap.empty) {
      email = uSnap.docs[0].data().email;
    } else if(u==='admin') {
      // fallback for initial admin
      email = 'admin@drystan.app';
    } else {
      throw new Error('Invalid username or password.');
    }
    await signInWithEmailAndPassword(auth, email, p);
  } catch(e) {
    const msg = e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'||e.code==='auth/user-not-found'
      ? 'Invalid username or password.'
      : e.code==='auth/too-many-requests'
      ? 'Too many attempts. Please try later.'
      : e.message.includes('Invalid username') ? e.message : 'Login failed. Check credentials.';
    err.style.display='flex';err.textContent='❌ '+msg;
    btn.disabled=false;btn.innerHTML='Sign In →';
  }
};

window.doForgotPw = async () => {
  const email=$('fEmail').value.trim();
  const btn=$('fBtn');
  const err=$('fErr');
  const ok=$('fOk');
  err.style.display='none';ok.style.display='none';
  if(!email){err.style.display='flex';err.textContent='❌ Please enter your email.';return;}
  btn.disabled=true;btn.innerHTML='<div class="spin spinSm"></div> Sending...';
  try{
    await sendPasswordResetEmail(auth, email);
    ok.style.display='flex';ok.textContent='✅ Password reset link sent! Check your email inbox.';
    btn.innerHTML='✅ Sent!';
  }catch(e){
    err.style.display='flex';err.textContent='❌ '+(e.code==='auth/user-not-found'?'No account found with this email.':e.message);
    btn.disabled=false;btn.innerHTML='Send Reset Link 📧';
  }
};

async function saveProd(id) {
  const btn=$('pSvBtn');btn.disabled=true;btn.innerHTML='<div class="spin spinSm"></div> Saving...';
  try{
    const data={name:$('p_n').value.trim(),nameBn:$('p_nb').value.trim(),buyPrice:Number($('p_b').value),sellPrice:Number($('p_s').value),stock:Number($('p_st').value),alertAt:Number($('p_al').value)||5,cat:$('p_cat').value.trim()||'General',description:$('p_desc').value.trim(),active:true};
    if(!data.name||!data.sellPrice){toast('Name and sell price required','err');btn.disabled=false;btn.innerHTML='💾 Save';return;}
    if(id){await updateDoc(Doc('products',id),{...data,updatedAt:serverTimestamp()});toast('Product updated! ✅');}
    else{await addDoc(Col('products'),{...data,createdAt:serverTimestamp()});toast('Product added! ✅');}
    closeMov('prodMOvl');pgProds();
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.innerHTML='💾 Save';}
}
window.saveProd=saveProd;

async function delProd(id,name) {
  if(!confirm(`Delete "${name}"?`))return;
  await updateDoc(Doc('products',id),{active:false});
  toast('Product deleted');pgProds();
}
window.delProd=delProd;

};
window.updTotal=()=>{
  const sub=G.oItems.reduce((s,it)=>s+(Number(it.price||0)*Number(it.qty||1)),0);
  const del=Number(G.oForm?.delivery||0);
  const tr=$('totRow');if(tr)tr.innerHTML=`<span>Grand Total</span><span style="color:var(--acc2)">${cur(sub+del)}</span>`;
  const sr=$('subRow');if(sr)sr.innerHTML=`<span>Subtotal</span><span style="font-weight:600">${cur(sub)}</span>`;

window.addOI=()=>{G.oItems.push({pid:'',qty:1,price:''});pgNewOrder();};
window.rmOI=(i)=>{G.oItems.splice(i,1);pgNewOrder();};
window.setOI=(i,field,val)=>{
  G.oItems[i][field]=val;
  if(field==='pid'&&val){
    const sels=document.querySelectorAll(`[onchange*="setOI(${i},'pid'"]`);
    if(sels.length){const opt=sels[0].querySelector(`option[value="${val}"]`);if(opt){G.oItems[i].price=opt.dataset.price||'';}}
  }
  window.updTotal();
};

window.submitOrder=async()=>{
  const f=G.oForm;
  const ordPhone=f.ordererPhone||f.cPhone;
  if(!f.cName||!ordPhone||!f.cAddr){toast('Please fill customer name, phone, and address','err');return;}
  const validItems=G.oItems.filter(it=>it.pid&&it.price);
  if(!validItems.length){toast('Add at least one product','err');return;}
  const btn=$('subOBtn');btn.disabled=true;btn.innerHTML='<div class="spin spinSm"></div> Creating...';
  try{
    for(const it of validItems){
      const pd=await getDoc(Doc('products',it.pid));
      const pdata=pd.data();
      if(!pdata||Number(pdata.stock)<Number(it.qty)){
        toast(`Insufficient stock for ${pdata?.name}. Available: ${pdata?.stock||0}`,'err');
        btn.disabled=false;btn.innerHTML='✅ Create Order & Receipt';return;
      }
    }
    const sub=validItems.reduce((s,it)=>s+(Number(it.price)*Number(it.qty)),0);
    const del=Number(f.delivery||0);
    const total=sub+del;
    const cnt=(await getDocs(Col('orders'))).size;
    const num='DRY-'+String(cnt+1).padStart(5,'0');
    const ordPhone=f.ordererPhone||f.cPhone;
    const recvPhone=f.recvPhone||ordPhone;
    // customer
    const cSnap=await getDocs(query(Col('customers'),where('phone','==',ordPhone)));
    let custId;
    if(!cSnap.empty){
      const cDoc=cSnap.docs[0];custId=cDoc.id;
      await updateDoc(Doc('customers',custId),{name:f.cName,addr:f.cAddr,orders:(cDoc.data().orders||0)+1,spent:(cDoc.data().spent||0)+total,updatedAt:serverTimestamp()});
    }else{
      const r=await addDoc(Col('customers'),{name:f.cName,phone:ordPhone,addr:f.cAddr,orders:1,spent:total,createdAt:serverTimestamp()});
      custId=r.id;
    }
    const oItems=await Promise.all(validItems.map(async it=>{
      const pd=(await getDoc(Doc('products',it.pid))).data();
      return{pid:it.pid,name:pd.name,nameBn:pd.nameBn||pd.name,qty:Number(it.qty),price:Number(it.price),lineTotal:Number(it.price)*Number(it.qty)};
    }));
    const oRef=await addDoc(Col('orders'),{
      num,custId,cName:f.cName,cPhone:ordPhone,ordererPhone:ordPhone,recvPhone,
      cAddr:f.cAddr,recvName:f.recvName||f.cName,
      payMethod:f.payMethod,delivery:del,subtotal:sub,total,
      status:'pending',payStatus:f.payMethod==='paid'?'paid':'pending',
      orderDate:f.orderDate,delivDate:f.delivDate,rLang:f.rLang,notes:f.notes,
      items:oItems,createdBy:G.user?.uid,createdAt:serverTimestamp()
    });
    for(const it of validItems){
      const pd=await getDoc(Doc('products',it.pid));
      await updateDoc(Doc('products',it.pid),{stock:Number(pd.data().stock)-Number(it.qty)});
    }
    toast('Order created successfully! 🎉');
    G.lastOrder={id:oRef.id,num,cName:f.cName,cPhone:ordPhone,ordererPhone:ordPhone,recvPhone,cAddr:f.cAddr,recvName:f.recvName||f.cName,payMethod:f.payMethod,delivery:del,subtotal:sub,total,orderDate:f.orderDate,delivDate:f.delivDate,rLang:f.rLang,notes:f.notes,items:oItems};
    G.oItems=[{pid:'',qty:1,price:''}];G.oForm=null;
    showReceipt(G.lastOrder);
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.innerHTML='✅ Create Order & Receipt';}
};

function showReceipt(o) {
  const cfg=G.cfg;const isEn=o.rLang!=='bn';
  const bname=isEn?(cfg.bizName||'Drystan'):(cfg.bizNameBn||cfg.bizName||'Drystan');
  const rHtml=`<div class="rcptBox${!isEn?' rcptBn':''}">
    <div style="text-align:center;border-bottom:2px solid #111;padding-bottom:16px;margin-bottom:16px">
      <div style="font-size:24px;font-weight:900;margin-bottom:4px">${esc(bname)}</div>
      ${cfg.bizAddr?`<div style="font-size:12px;color:#666;margin-bottom:2px">📍 ${esc(cfg.bizAddr)}</div>`:''}
      ${cfg.bizPhone?`<div style="font-size:12px;color:#666">📞 ${esc(cfg.bizPhone)}</div>`:''}
      <div style="font-size:14px;font-weight:700;margin-top:10px;letter-spacing:3px;color:#333">${isEn?'— RECEIPT —':'— রশিদ —'}</div>

}

async function delOrder(id){
  if(!confirm('Delete this order? Stock will be restored.'))return;
  try{
    const d=await getDoc(Doc('orders',id));
    const o=d.data();
    if(o.status!=='cancelled'&&o.items){
      for(const it of o.items){
        const pd=await getDoc(Doc('products',it.pid));
        if(pd.exists())await updateDoc(Doc('products',it.pid),{stock:Number(pd.data().stock||0)+it.qty});
      }
    }
    await deleteDoc(Doc('orders',id));
    toast('Order deleted, stock restored');pgOrders();
  }catch(e){toast(e.message,'err');}
}
window.delOrder=delOrder;

        `<div class="tWrap"><table>
          <thead><tr><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Added</th><th>Actions</th></tr></thead>
          <tbody>${users.filter(u=>u.role==='moderator').map((u,i)=>`<tr style="animation:fadeUp .3s ease;animation-delay:${i*0.05}s">
            <td style="font-weight:600">${esc(u.displayName||u.username)}</td>
            <td><code style="color:var(--acc2)">${esc(u.username)}</code></td>
            <td style="font-size:13px;color:var(--t2)">${esc(u.email)}</td>
            <td><span class="badge bMod">MODERATOR</span></td>
            <td style="font-size:12px;color:var(--t3)">${u.createdAt?fdate(u.createdAt):'-'}</td>
            <td><button class="btn bD bSm" onclick="deleteMod('${u.id}','${u.authUid}','${esc(u.username)}')">🗑️ Remove</button></td>
          </tr>`).join('')}</tbody>
        </table></div>`}
    </div>
    <div class="mOvl" id="modMOvl" onclick="if(event.target===this)closeMov('modMOvl')">
      <div class="modal" id="modMod"></div>
    </div>`);
  }catch(e){setC(`<div class="al aE">❌ ${e.message}</div>`);}
}

window.openAddMod=()=>{
  $('modMod').innerHTML=`
  <div class="mH"><h3>➕ Add Moderator</h3><button class="btn bS bIco" onclick="closeMov('modMOvl')">✕</button></div>
  <div class="mB">
    <div class="al aI">
      ℹ️ Moderators can only <strong>Create Orders</strong> and <strong>Update Order Status</strong>. They cannot access Products, Customers, or Settings.
    </div>
    <div class="fG"><label class="fL">Full Name *</label><input class="fI" id="mod_name" placeholder="e.g. John Doe"/></div>
    <div class="fG"><label class="fL">Username * <span style="color:var(--t3)">(used for login)</span></label><input class="fI" id="mod_user" placeholder="e.g. john_mod"/></div>
    <div class="fG"><label class="fL">Email * <span style="color:var(--t3)">(for password reset)</span></label><input class="fI" type="email" id="mod_email" placeholder="john@example.com"/></div>
    <div class="fG">
      <label class="fL">Password *</label>
      <div style="position:relative">
        <input class="fI" type="password" id="mod_pass" placeholder="Min 6 characters" style="padding-right:42px"/>
        <button type="button" onclick="togglePw('mod_pass','eyeM')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3)">
          <svg id="eyeM" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div id="modErr" class="al aE" style="display:none"></div>
  </div>
  <div class="mF">
    <button class="btn bS" onclick="closeMov('modMOvl')">Cancel</button>
    <button class="btn bP" id="modSvBtn" onclick="saveMod()">➕ Add Moderator</button>
  </div>`;

window.saveMod=async()=>{
  const name=$('mod_name').value.trim();
  const username=$('mod_user').value.trim().toLowerCase();
  const email=$('mod_email').value.trim();
  const pass=$('mod_pass').value;
  const err=$('modErr');
  const btn=$('modSvBtn');
  err.style.display='none';
  if(!name||!username||!email||!pass){err.style.display='flex';err.textContent='❌ All fields are required.';return;}
  if(pass.length<6){err.style.display='flex';err.textContent='❌ Password must be at least 6 characters.';return;}
  // Check username unique
  const existing=await getDocs(query(Col('users'),where('username','==',username)));
  if(!existing.empty){err.style.display='flex';err.textContent='❌ Username already taken.';return;}
  btn.disabled=true;btn.innerHTML='<div class="spin spinSm"></div> Creating...';
  try{
    // Create Firebase Auth user
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    const uid=cred.user.uid;
    // Save to users collection
    await setDoc(Doc('users',uid),{displayName:name,username,email,role:'moderator',authUid:uid,createdAt:serverTimestamp()});
    // Re-sign in as admin (creating user signs in as new user)
    toast('Moderator added! Please re-login as admin.','warn');
    await signOut(auth);
  }catch(e){
    err.style.display='flex';err.textContent='❌ '+(e.code==='auth/email-already-in-use'?'Email already in use.':e.message);
    btn.disabled=false;btn.innerHTML='➕ Add Moderator';
  }
};

async function deleteMod(docId,authUid,username){
  if(!confirm(`Remove moderator "${username}"?`))return;
  try{
    await deleteDoc(Doc('users',docId||authUid));
    toast('Moderator removed');pgTeam();
  }catch(e){toast(e.message,'err');}
}
window.deleteMod=deleteMod;

window.saveCfg=async()=>{
  try{
    const data={bizName:$('s_n').value,bizNameBn:$('s_nb').value,bizAddr:$('s_addr').value,bizPhone:$('s_ph').value,delCOD:$('s_dc').value,delPaid:$('s_dp').value,footerEn:$('s_fe').value,footerBn:$('s_fb').value};
    await setDoc(Doc('config','settings'),data,{merge:true});
    G.cfg={...G.cfg,...data};
    $('bizNm').textContent=G.lang==='bn'?(data.bizNameBn||data.bizName):(data.bizName);
    toast('Settings saved! ✅');
  }catch(e){toast(e.message,'err');}
};

window.closeMov=(id)=>{$(id)?.classList.remove('open');};

// ══ AUTH STATE LISTENER ══
onAuthStateChanged(auth, async(user)=>{
  const ls=$('loadScreen');
  if(user){
    G.user=user;
    // Determine role
    try{
      const uDoc=await getDoc(Doc('users',user.uid));
      if(uDoc.exists()){
        G.role=uDoc.data().role||'moderator';
      } else {
        G.role='admin'; // First user / admin
        // Save admin to users if not exists
        await setDoc(Doc('users',user.uid),{displayName:'Admin',username:'admin',email:user.email,role:'admin',authUid:user.uid,createdAt:serverTimestamp()},{merge:true});
      }
      // Load config
      const cfgDoc=await getDoc(Doc('config','settings'));
      if(cfgDoc.exists())G.cfg=cfgDoc.data();
    }catch{}
    ls.classList.add('hide');setTimeout(()=>ls.style.display='none',500);
    $('loginWrap').classList.remove('show');
    $('appWrap').classList.add('show');
    applyTheme();
    $('langLbl').textContent=G.lang.toUpperCase();
    // Set default page based on role
    G.page=G.role==='moderator'?'newOrder':'dash';
    nav(G.page);
  }else{
    G.user=null;G.role=null;
    ls.classList.add('hide');setTimeout(()=>ls.style.display='none',500);
    $('appWrap').classList.remove('show');
    $('loginWrap').classList.add('show');
    applyTheme();
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&$('loginWrap').classList.contains('show')&&$('signInForm').style.display!=='none')window.doLogin();
});
window.G=G;
</script>
